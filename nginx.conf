server {
    listen 80;
    server_name thelonesomeera.com www.thelonesomeera.com;

    client_max_body_size 10M;

    # Next.js 建置產物（長期快取）
    location ^~ /_next/static/ {
        alias /var/www/thelonesomeera/.next/static/;
        try_files $uri =404;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # 子專案目錄直接存取
    location /hellrider/    { alias /var/www/thelonesomeera/public/hellrider/; }
    location /sox/          { alias /var/www/thelonesomeera/public/sox/; }
    location /mini-minecraft/ { alias /var/www/thelonesomeera/public/mini-minecraft/; }
    location /xiaoming/     { alias /var/www/thelonesomeera/public/xiaoming/; }
    location /shoot_the_duck/ { alias /var/www/thelonesomeera/public/shoot_the_duck/; }
    location /earthmoonsystem/ { alias /var/www/thelonesomeera/public/earthmoonsystem/; }
    location /blackhole/    { alias /var/www/thelonesomeera/public/blackhole/; }
    location /solarsystem/  { alias /var/www/thelonesomeera/public/solarsystem/; }
    location /signuptest/   { alias /var/www/thelonesomeera/public/signuptest/; }
    location /cybermessager/ { alias /var/www/thelonesomeera/public/cybermessager/; }
    location /callofduty/   { alias /var/www/thelonesomeera/public/callofduty/; }
    location /tech/         { alias /var/www/thelonesomeera/public/tech/; }
    location /ailecture/    { alias /var/www/thelonesomeera/public/ailecture/; }
    location /privacypolicy/ { alias /var/www/thelonesomeera/public/privacypolicy/; }
    location /dist-androidtest/ { alias /var/www/thelonesomeera/public/dist-androidtest/; }
    location /assets/       { alias /var/www/thelonesomeera/public/assets/; }
    location /uploads/      { alias /var/www/thelonesomeera/public/uploads/; }

    # 靜態檔案：public/ 目錄
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2|woff|ttf|mp3|mp4|xml|txt|json)$ {
        root /var/www/thelonesomeera/public;
        try_files $uri @nextjs;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # 所有其他請求反向代理到 Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
