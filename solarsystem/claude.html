<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 太陽系模擬</title>
    <!-- 引入 Three.js 模組映射 -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        /* 資訊面板樣式 */
        #info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            color: white;
            z-index: 100;
            min-width: 220px;
        }

        #info-panel h1 {
            font-size: 1.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #info-panel p {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        /* 行星資訊卡片 */
        #planet-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 20px 30px;
            color: white;
            z-index: 100;
            display: none;
            text-align: center;
            min-width: 300px;
        }

        #planet-info.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        #planet-info h2 {
            font-size: 1.8em;
            margin-bottom: 8px;
        }

        #planet-info .planet-detail {
            font-size: 0.9em;
            color: #bbb;
        }

        /* 控制面板 */
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            z-index: 100;
        }

        #controls label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9em;
            cursor: pointer;
        }

        #controls input[type="range"] {
            width: 120px;
            accent-color: #ffd700;
        }

        #controls button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.9em;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #controls button:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        /* 行星圖例 */
        #legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            z-index: 100;
            font-size: 0.8em;
        }

        #legend h3 {
            margin-bottom: 10px;
            font-size: 1em;
            color: #ffd700;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            padding: 3px 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- 資訊面板 -->
    <div id="info-panel">
        <h1>🌌 太陽系模擬</h1>
        <p>🖱️ 左鍵拖曳：旋轉視角</p>
        <p>🔍 滾輪：縮放</p>
        <p>✋ 右鍵拖曳：平移</p>
        <p>👆 點擊行星查看資訊</p>
    </div>

    <!-- 控制面板 -->
    <div id="controls">
        <label>
            速度：
            <input type="range" id="speed-slider" min="0" max="3" step="0.1" value="1">
        </label>
        <label>
            <input type="checkbox" id="orbit-toggle" checked>
            顯示軌道
        </label>
        <label>
            <input type="checkbox" id="label-toggle" checked>
            顯示標籤
        </label>
        <button id="reset-btn">重置視角</button>
        <button id="top-view-btn">俯視視角</button>
    </div>

    <!-- 行星資訊卡片 -->
    <div id="planet-info">
        <h2 id="planet-name">地球</h2>
        <p class="planet-detail" id="planet-detail"></p>
    </div>

    <!-- 行星圖例 -->
    <div id="legend">
        <h3>行星圖例</h3>
        <div id="legend-items"></div>
    </div>

    <script type="module">
        // 引入 Three.js 及相關模組
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 全域變數
        let scene, camera, renderer, controls;
        let sun, planets = [], orbits = [], labels = [];
        let speedMultiplier = 1;
        let raycaster, mouse;

        // 行星資料（相對比例已調整以便觀察）
        const planetData = [
            { 
                name: '水星', nameEn: 'Mercury',
                radius: 0.4, distance: 8, color: 0x8c8c8c,
                orbitSpeed: 0.04, rotationSpeed: 0.01,
                info: '距太陽最近的行星，表面溫差極大（-180°C 至 430°C）'
            },
            { 
                name: '金星', nameEn: 'Venus',
                radius: 0.9, distance: 12, color: 0xffc649,
                orbitSpeed: 0.015, rotationSpeed: 0.005,
                info: '大氣層極為濃密，表面溫度高達 465°C，是太陽系最熱的行星'
            },
            { 
                name: '地球', nameEn: 'Earth',
                radius: 1, distance: 16, color: 0x6b93d6,
                orbitSpeed: 0.01, rotationSpeed: 0.02,
                info: '我們的家園，目前已知唯一存在生命的星球',
                hasMoon: true
            },
            { 
                name: '火星', nameEn: 'Mars',
                radius: 0.5, distance: 22, color: 0xc1440e,
                orbitSpeed: 0.008, rotationSpeed: 0.018,
                info: '紅色星球，擁有太陽系最高的山（奧林帕斯山，高 21.9 公里）'
            },
            { 
                name: '木星', nameEn: 'Jupiter',
                radius: 3, distance: 34, color: 0xd8ca9d,
                orbitSpeed: 0.002, rotationSpeed: 0.04,
                info: '太陽系最大的行星，體積是地球的 1,321 倍',
                hasRing: false
            },
            { 
                name: '土星', nameEn: 'Saturn',
                radius: 2.5, distance: 48, color: 0xead6b8,
                orbitSpeed: 0.0009, rotationSpeed: 0.038,
                info: '以美麗的環聞名，主要由冰和岩石碎片組成',
                hasRing: true, ringColor: 0xc9b896
            },
            { 
                name: '天王星', nameEn: 'Uranus',
                radius: 1.6, distance: 60, color: 0xd1e7e7,
                orbitSpeed: 0.0004, rotationSpeed: 0.03,
                info: '自轉軸幾乎平躺，是唯一「躺著」轉的行星',
                hasRing: true, ringColor: 0x555555
            },
            { 
                name: '海王星', nameEn: 'Neptune',
                radius: 1.5, distance: 72, color: 0x5b5ddf,
                orbitSpeed: 0.0001, rotationSpeed: 0.032,
                info: '太陽系最遠的行星，風速可達 2,100 公里/小時'
            }
        ];

        // 初始化場景
        function init() {
            // 建立場景
            scene = new THREE.Scene();

            // 建立相機
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                2000
            );
            camera.position.set(50, 40, 80);

            // 建立渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 建立軌道控制器
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 10;
            controls.maxDistance = 300;

            // 射線檢測器（用於點擊行星）
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // 建立星空背景
            createStarfield();

            // 建立太陽
            createSun();

            // 建立行星
            planetData.forEach((data, index) => {
                createPlanet(data, index);
            });

            // 建立圖例
            createLegend();

            // 事件監聽
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('click', onMouseClick);

            // 控制面板事件
            document.getElementById('speed-slider').addEventListener('input', (e) => {
                speedMultiplier = parseFloat(e.target.value);
            });

            document.getElementById('orbit-toggle').addEventListener('change', (e) => {
                orbits.forEach(orbit => orbit.visible = e.target.checked);
            });

            document.getElementById('label-toggle').addEventListener('change', (e) => {
                labels.forEach(label => label.visible = e.target.checked);
            });

            document.getElementById('reset-btn').addEventListener('click', () => {
                camera.position.set(50, 40, 80);
                controls.target.set(0, 0, 0);
                controls.update();
            });

            document.getElementById('top-view-btn').addEventListener('click', () => {
                camera.position.set(0, 120, 0);
                controls.target.set(0, 0, 0);
                controls.update();
            });
        }

        // 建立星空背景
        function createStarfield() {
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 10000;
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount; i++) {
                // 隨機分佈在球殼上
                const radius = 800 + Math.random() * 200;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);

                // 隨機星星顏色（白、藍、黃色調）
                const colorChoice = Math.random();
                if (colorChoice < 0.7) {
                    colors[i * 3] = 1;
                    colors[i * 3 + 1] = 1;
                    colors[i * 3 + 2] = 1;
                } else if (colorChoice < 0.85) {
                    colors[i * 3] = 0.7;
                    colors[i * 3 + 1] = 0.8;
                    colors[i * 3 + 2] = 1;
                } else {
                    colors[i * 3] = 1;
                    colors[i * 3 + 1] = 0.95;
                    colors[i * 3 + 2] = 0.8;
                }
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const starsMaterial = new THREE.PointsMaterial({
                size: 1.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });

            const starfield = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starfield);
        }

        // 建立太陽
        function createSun() {
            // 太陽本體
            const sunGeometry = new THREE.SphereGeometry(5, 64, 64);
            const sunMaterial = new THREE.MeshBasicMaterial({
                color: 0xffdd00,
                emissive: 0xffdd00
            });
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            sun.userData = { 
                name: '太陽', 
                nameEn: 'Sun',
                info: '太陽系的中心恆星，佔太陽系總質量的 99.86%'
            };
            scene.add(sun);

            // 太陽光暈效果
            const glowGeometry = new THREE.SphereGeometry(6.5, 32, 32);
            const glowMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    viewVector: { value: camera.position }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                        gl_FragColor = vec4(1.0, 0.6, 0.1, 1.0) * intensity;
                    }
                `,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                transparent: true
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            sun.add(glow);

            // 點光源（太陽發光）
            const sunLight = new THREE.PointLight(0xffffff, 2, 500);
            scene.add(sunLight);

            // 環境光
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);
        }

        // 建立行星
        function createPlanet(data, index) {
            // 軌道樞紐（用於公轉）
            const pivot = new THREE.Object3D();
            scene.add(pivot);

            // 行星本體
            const geometry = new THREE.SphereGeometry(data.radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: data.color,
                roughness: 0.8,
                metalness: 0.1
            });
            const planet = new THREE.Mesh(geometry, material);
            planet.position.x = data.distance;
            planet.userData = { ...data, type: 'planet' };
            pivot.add(planet);

            // 行星環（土星、天王星）
            if (data.hasRing) {
                const ringInner = data.radius * 1.4;
                const ringOuter = data.radius * 2.2;
                const ringGeometry = new THREE.RingGeometry(ringInner, ringOuter, 64);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: data.ringColor || 0xaaaaaa,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.7
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.PI / 2.2;
                planet.add(ring);
            }

            // 地球的月亮
            if (data.hasMoon) {
                const moonGeometry = new THREE.SphereGeometry(0.27, 16, 16);
                const moonMaterial = new THREE.MeshStandardMaterial({
                    color: 0xaaaaaa,
                    roughness: 1
                });
                const moon = new THREE.Mesh(moonGeometry, moonMaterial);
                moon.position.x = 2.5;
                moon.userData = { 
                    name: '月球', 
                    nameEn: 'Moon',
                    info: '地球唯一的天然衛星，距離地球約 38 萬公里',
                    orbitSpeed: 0.05
                };

                const moonPivot = new THREE.Object3D();
                moonPivot.add(moon);
                planet.add(moonPivot);
                planet.userData.moonPivot = moonPivot;
            }

            // 軌道路徑
            const orbitGeometry = new THREE.RingGeometry(data.distance - 0.1, data.distance + 0.1, 128);
            const orbitMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.15
            });
            const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);
            orbits.push(orbit);

            // 行星標籤
            const label = createLabel(data.name, data.color);
            planet.add(label);
            label.position.y = data.radius + 1.5;
            labels.push(label);

            // 儲存行星資料
            planets.push({
                pivot,
                mesh: planet,
                data
            });
        }

        // 建立文字標籤
        function createLabel(text, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;

            ctx.fillStyle = 'transparent';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 10);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ 
                map: texture,
                transparent: true
            });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(4, 1, 1);

            return sprite;
        }

        // 建立圖例
        function createLegend() {
            const container = document.getElementById('legend-items');
            
            // 加入太陽
            const sunItem = document.createElement('div');
            sunItem.className = 'legend-item';
            sunItem.innerHTML = `
                <span class="legend-color" style="background: #ffdd00;"></span>
                <span>太陽 Sun</span>
            `;
            sunItem.addEventListener('click', () => focusOnObject(sun));
            container.appendChild(sunItem);

            // 加入行星
            planetData.forEach((planet, index) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <span class="legend-color" style="background: #${planet.color.toString(16).padStart(6, '0')};"></span>
                    <span>${planet.name} ${planet.nameEn}</span>
                `;
                item.addEventListener('click', () => focusOnPlanet(index));
                container.appendChild(item);
            });
        }

        // 聚焦到行星
        function focusOnPlanet(index) {
            const planet = planets[index];
            const worldPos = new THREE.Vector3();
            planet.mesh.getWorldPosition(worldPos);
            
            controls.target.copy(worldPos);
            camera.position.set(
                worldPos.x + planet.data.radius * 5,
                worldPos.y + planet.data.radius * 3,
                worldPos.z + planet.data.radius * 5
            );
            controls.update();

            showPlanetInfo(planet.data);
        }

        // 聚焦到物件
        function focusOnObject(obj) {
            controls.target.set(0, 0, 0);
            camera.position.set(20, 15, 20);
            controls.update();

            if (obj.userData) {
                showPlanetInfo(obj.userData);
            }
        }

        // 顯示行星資訊
        function showPlanetInfo(data) {
            const infoPanel = document.getElementById('planet-info');
            document.getElementById('planet-name').textContent = `${data.name} ${data.nameEn || ''}`;
            document.getElementById('planet-detail').textContent = data.info;
            infoPanel.classList.add('show');

            // 3 秒後自動隱藏
            setTimeout(() => {
                infoPanel.classList.remove('show');
            }, 5000);
        }

        // 滑鼠點擊事件
        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // 檢測行星
            const planetMeshes = planets.map(p => p.mesh);
            planetMeshes.push(sun);
            const intersects = raycaster.intersectObjects(planetMeshes, true);

            if (intersects.length > 0) {
                let target = intersects[0].object;
                
                // 找到最上層的行星物件
                while (target.parent && !target.userData.type && target.parent !== scene) {
                    target = target.parent;
                }

                if (target.userData && target.userData.name) {
                    showPlanetInfo(target.userData);
                }
            }
        }

        // 視窗大小變化
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 動畫循環
        function animate() {
            requestAnimationFrame(animate);

            // 太陽自轉
            sun.rotation.y += 0.002 * speedMultiplier;

            // 行星公轉與自轉
            planets.forEach(planet => {
                // 公轉
                planet.pivot.rotation.y += planet.data.orbitSpeed * speedMultiplier;
                
                // 自轉
                planet.mesh.rotation.y += planet.data.rotationSpeed * speedMultiplier;

                // 月球公轉
                if (planet.data.hasMoon && planet.mesh.userData.moonPivot) {
                    planet.mesh.userData.moonPivot.rotation.y += 0.02 * speedMultiplier;
                }

                // 標籤始終面向相機
                labels.forEach(label => {
                    label.lookAt(camera.position);
                });
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // 啟動
        init();
        animate();
    </script>
</body>
</html>
