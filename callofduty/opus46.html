<script type="module">
import * as THREE from 'three';

/* ═══════════════════════════════════════════════════════════
   CONFIG — 所有可調參數集中管理
═══════════════════════════════════════════════════════════ */
const CFG = {
  // 玩家
  MOVE_SPEED:    6,
  SPRINT_MULT:   1.55,
  JUMP_VEL:      7.5,
  GRAVITY:       20,
  MOUSE_SENS:    0.002,
  PLAYER_HEIGHT: 1.7,
  PLAYER_RADIUS: 0.35,
  PLAYER_HP:     100,
  STEP_HEIGHT:   0.55,

  // 攝影機
  FOV_NORMAL: 75,
  FOV_SPRINT: 83,

  // 武器
  FIRE_RATE:     0.11,
  MAG_SIZE:      30,
  RESERVE_AMMO:  120,
  RELOAD_TIME:   2.0,
  RECOIL_KICK:   0.028,
  DAMAGE:        34,
  RANGE:         120,

  // 敵人 AI
  ENEMY_HP:           100,
  ENEMY_SPEED:        3.2,
  ENEMY_DAMAGE:       8,
  ENEMY_FIRE_RATE:    0.9,
  ENEMY_VISION_RANGE: 32,
  ENEMY_ATTACK_RANGE: 26,
  ENEMY_SPREAD:       0.09,
  ENEMY_RADIUS:       0.32,

  // 波次
  WAVE_BASE: 6,
  WAVE_ADD:  2,
};

/* 敵人出生點 */
const SPAWN_PTS = [
  [-22,0,-22],[22,0,-22],[-22,0,22],[22,0,22],
  [0,0,-22],[0,0,22],[18,0,10],[-18,0,10],
  [10,0,-12],[-10,0,12],[26,0,-8],[-26,0,8],
];

/* 關卡幾何資料: [位置, 尺寸, 顏色] */
const LEVEL_DATA = [
  // 圍牆
  [[0,2,-31],[64,4,2],0x808080],[[0,2,31],[64,4,2],0x808080],
  [[-31,2,0],[2,4,64],0x808080],[[31,2,0],[2,4,64],0x808080],
  // 中央結構
  [[0,1.25,0],[4,2.5,4],0x707070],
  // 掩體牆
  [[-10,1,-8],[8,2,.5],0x686868],[[10,1,8],[8,2,.5],0x686868],
  [[-5,1,13],[.5,2,6],0x686868],[[18,1,-4],[.5,2,8],0x686868],
  // 箱子
  [[-15,.75,15],[1.5,1.5,1.5],0x556B2F],[[-13,.75,14],[1.5,1.5,1.5],0x556B2F],
  [[20,.75,-10],[1.5,1.5,1.5],0x556B2F],[[-20,.75,-15],[1.5,1.5,1.5],0x4B5320],
  [[12,.75,19],[1.5,1.5,1.5],0x4B5320],[[-12,.75,-18],[1.5,1.5,1.5],0x556B2F],
  // 高塔
  [[15,2,-15],[3,4,3],0x707070],
  // L 形掩體
  [[-20,1,0],[6,2,.5],0x686868],[[-17,1,3.25],[.5,2,6.5],0x686868],
  // 平台 + 階梯
  [[23,.25,21.5],[4,.5,2],0x607060],[[23,.55,19.5],[4,1.1,2],0x607060],
  [[23,.75,16],[6,1.5,5],0x607060],
  // 散落掩體
  [[8,1,-20],[2,2,2],0x556B2F],[[-8,1,21],[3,2,1],0x686868],
  [[-25,1,-20],[2,2,3],0x556B2F],[[25,1,5],[1,2,5],0x686868],
  [[6,.75,6],[1.5,1.5,1.5],0x4B5320],[[-6,.75,-6],[1.5,1.5,1.5],0x4B5320],
];

/* ═══════════════════════════════════════════════════════════
   AUDIO — WebAudio 產生簡易音效
═══════════════════════════════════════════════════════════ */
class AudioSys {
  constructor() { this.ctx = null; }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  /* 噪音脈衝 */
  _noise(dur, vol, freq) {
    if (!this.ctx) return;
    const sr = this.ctx.sampleRate, len = sr * dur | 0;
    const buf = this.ctx.createBuffer(1, len, sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const g = this.ctx.createGain();
    g.gain.value = vol;
    if (freq) {
      const f = this.ctx.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = freq;
      src.connect(f).connect(g).connect(this.ctx.destination);
    } else {
      src.connect(g).connect(this.ctx.destination);
    }
    src.start();
  }

  /* 音調 */
  _tone(hz, dur, vol, type = 'sine') {
    if (!this.ctx) return;
    const o = this.ctx.createOscillator();
    o.type = type; o.frequency.value = hz;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, this.ctx.currentTime + dur);
    o.connect(g).connect(this.ctx.destination);
    o.start(); o.stop(this.ctx.currentTime + dur);
  }

  gunshot()    { this._noise(.07, .22, 2800); this._tone(75, .1, .12); }
  reload()     { this._tone(700, .04, .08, 'square'); setTimeout(() => this._tone(950, .04, .08, 'square'), 180); }
  reloadEnd()  { this._tone(1100, .035, .07, 'square'); }
  hitMark()    { this._tone(1100, .045, .07); }
  killMark()   { this._tone(1100, .04, .06); this._tone(1400, .04, .06); }
  enemyDeath() { this._tone(90, .25, .12); }
  playerHurt() { this._tone(55, .12, .15); this._noise(.04, .08, 400); }
  footstep()   { this._noise(.025, .018, 700); }
  enemyShot()  { this._noise(.05, .1, 2000); this._tone(100, .06, .06); }
}

/* ═══════════════════════════════════════════════════════════
   FX MANAGER — 管理暫時性視覺特效
═══════════════════════════════════════════════════════════ */
class FXManager {
  constructor(scene) { this.scene = scene; this.list = []; }

  add(mesh, dur, fn) {
    this.scene.add(mesh);
    this.list.push({ mesh, t: dur, fn });
  }

  update(dt) {
    for (let i = this.list.length - 1; i >= 0; i--) {
      const e = this.list[i];
      e.t -= dt;
      if (e.t <= 0) {
        this.scene.remove(e.mesh);
        e.mesh.geometry?.dispose();
        e.mesh.material?.dispose();
        this.list.splice(i, 1);
      } else if (e.fn) {
        e.fn(e.mesh, dt);
      }
    }
  }

  clear() {
    for (const e of this.list) this.scene.remove(e.mesh);
    this.list.length = 0;
  }
}

/* ═══════════════════════════════════════════════════════════
   WORLD — 建構關卡幾何與碰撞體
═══════════════════════════════════════════════════════════ */
class World {
  constructor(scene) {
    this.scene = scene;
    this.colliders = [];   // Box3 陣列
    this.meshes = [];      // 用於射線檢測
    this._build();
  }

  _addBox(pos, size, color) {
    const geo = new THREE.BoxGeometry(size[0], size[1], size[2]);
    const mat = new THREE.MeshLambertMaterial({ color });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(pos[0], pos[1], pos[2]);
    this.scene.add(m);
    this.meshes.push(m);
    const h = [size[0] / 2, size[1] / 2, size[2] / 2];
    this.colliders.push(new THREE.Box3(
      new THREE.Vector3(pos[0] - h[0], pos[1] - h[1], pos[2] - h[2]),
      new THREE.Vector3(pos[0] + h[0], pos[1] + h[1], pos[2] + h[2])
    ));
    return m;
  }

  _build() {
    /* 地板 */
    const floorGeo = new THREE.PlaneGeometry(62, 62, 16, 16);
    floorGeo.rotateX(-Math.PI / 2);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0xC2B280 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    this.scene.add(floor);
    /* 地板用於射線（彈孔） */
    this.meshes.push(floor);

    /* 場景物件 */
    for (const [p, s, c] of LEVEL_DATA) this._addBox(p, s, c);
  }
}

/* ═══════════════════════════════════════════════════════════
   PLAYER — 第一人稱控制器
═══════════════════════════════════════════════════════════ */
class Player {
  constructor(camera, world) {
    this.cam = camera;
    this.world = world;
    this.pos = new THREE.Vector3(0, 0, 25);
    this.vel = new THREE.Vector3();
    this.yaw = 0;
    this.pitch = 0;
    this.onGround = false;
    this.health = CFG.PLAYER_HP;
    this.sprinting = false;
    this.bobT = 0;
    this.stepCd = 0;
    this.input = { fwd:0,bk:0,lt:0,rt:0, sprint:0,jump:0, mx:0,my:0 };
  }

  /* 重生 */
  respawn() {
    this.pos.set(0, 0, 25); this.vel.set(0, 0, 0);
    this.yaw = 0; this.pitch = 0;
    this.health = CFG.PLAYER_HP; this.onGround = false;
  }

  eyePos() {
    return new THREE.Vector3(this.pos.x, this.pos.y + CFG.PLAYER_HEIGHT, this.pos.z);
  }

  update(dt, audio) {
    /* 滑鼠視角 */
    this.yaw   -= this.input.mx * CFG.MOUSE_SENS;
    this.pitch  -= this.input.my * CFG.MOUSE_SENS;
    this.pitch  = Math.max(-1.5, Math.min(1.5, this.pitch));
    this.input.mx = this.input.my = 0;

    /* 移動方向 */
    const sy = Math.sin(this.yaw), cy = Math.cos(this.yaw);
    const fwd = new THREE.Vector3(-sy, 0, -cy);
    const rgt = new THREE.Vector3(cy, 0, -sy);
    const dir = new THREE.Vector3();
    if (this.input.fwd) dir.add(fwd);
    if (this.input.bk)  dir.sub(fwd);
    if (this.input.rt)  dir.add(rgt);
    if (this.input.lt)  dir.sub(rgt);
    if (dir.lengthSq() > 0) dir.normalize();

    this.sprinting = !!(this.input.sprint && this.input.fwd && this.onGround);
    const spd = CFG.MOVE_SPEED * (this.sprinting ? CFG.SPRINT_MULT : 1);
    this.vel.x = dir.x * spd;
    this.vel.z = dir.z * spd;

    /* 重力 & 跳躍 */
    this.vel.y -= CFG.GRAVITY * dt;
    if (this.input.jump && this.onGround) {
      this.vel.y = CFG.JUMP_VEL;
      this.onGround = false;
    }

    /* 碰撞移動 */
    this._move(dt);

    /* 跌出世界 → 重生 */
    if (this.pos.y < -20) this.respawn();

    /* 攝影機位置 */
    this.cam.position.set(this.pos.x, this.pos.y + CFG.PLAYER_HEIGHT, this.pos.z);

    /* FOV 插值 */
    const tFov = this.sprinting ? CFG.FOV_SPRINT : CFG.FOV_NORMAL;
    this.cam.fov += (tFov - this.cam.fov) * .12;
    this.cam.updateProjectionMatrix();

    /* 腳步聲 & 搖晃 */
    if (dir.lengthSq() > 0 && this.onGround) {
      this.bobT += dt * (this.sprinting ? 13 : 9);
      this.stepCd -= dt;
      if (this.stepCd <= 0) { audio.footstep(); this.stepCd = this.sprinting ? .28 : .38; }
    } else {
      this.stepCd = 0;
    }
  }

  /* 分軸碰撞解算 */
  _move(dt) {
    const R = CFG.PLAYER_RADIUS, H = CFG.PLAYER_HEIGHT;
    const cols = this.world.colliders;
    const ov = (px, py, pz, b) =>
      px + R > b.min.x && px - R < b.max.x &&
      py + H > b.min.y && py     < b.max.y &&
      pz + R > b.min.z && pz - R < b.max.z;

    /* 每次移動開始重設著地狀態 */
    this.onGround = false;

    /* X 軸 */
    this.pos.x += this.vel.x * dt;
    for (const b of cols) {
      if (!ov(this.pos.x, this.pos.y, this.pos.z, b)) continue;
      const sh = b.max.y - this.pos.y;
      if (sh > 0 && sh <= CFG.STEP_HEIGHT) {
        let ok = true;
        for (const b2 of cols) { if (b2 !== b && ov(this.pos.x, b.max.y + .01, this.pos.z, b2)) { ok = false; break; } }
        if (ok) { this.pos.y = b.max.y + .01; this.vel.y = 0; this.onGround = true; continue; }
      }
      const cx = (b.min.x + b.max.x) / 2;
      this.pos.x = this.pos.x < cx ? b.min.x - R : b.max.x + R;
    }

    /* Z 軸 */
    this.pos.z += this.vel.z * dt;
    for (const b of cols) {
      if (!ov(this.pos.x, this.pos.y, this.pos.z, b)) continue;
      const sh = b.max.y - this.pos.y;
      if (sh > 0 && sh <= CFG.STEP_HEIGHT) {
        let ok = true;
        for (const b2 of cols) { if (b2 !== b && ov(this.pos.x, b.max.y + .01, this.pos.z, b2)) { ok = false; break; } }
        if (ok) { this.pos.y = b.max.y + .01; this.vel.y = 0; this.onGround = true; continue; }
      }
      const cz = (b.min.z + b.max.z) / 2;
      this.pos.z = this.pos.z < cz ? b.min.z - R : b.max.z + R;
    }

    /* Y 軸 */
    this.pos.y += this.vel.y * dt;
    if (this.pos.y <= 0) { this.pos.y = 0; this.vel.y = 0; this.onGround = true; }
    for (const b of cols) {
      if (!ov(this.pos.x, this.pos.y, this.pos.z, b)) continue;
      if (this.vel.y <= 0) { this.pos.y = b.max.y; this.onGround = true; }
      else                  { this.pos.y = b.min.y - H; }
      this.vel.y = 0;
    }
  }

  takeDamage(n) { this.health = Math.max(0, this.health - n); }
}

/* ═══════════════════════════════════════════════════════════
   WEAPON — 射擊、彈藥、後座力、視覺模型
═══════════════════════════════════════════════════════════ */
class Weapon {
  constructor(camera, scene, audio) {
    this.cam = camera; this.scene = scene; this.audio = audio;
    this.mag = CFG.MAG_SIZE;
    this.reserve = CFG.RESERVE_AMMO;
    this.reloading = false;
    this.reloadT = 0;
    this.lastFire = 0;
    this.wantFire = false;
    this.justFired = false;

    /* 後座力 */
    this.recoilPitch = 0;
    this.recoilZ = 0;

    /* 閃光 */
    this.flashT = 0;

    /* 建立模型 */
    this.grp = new THREE.Group();
    const gm1 = new THREE.MeshLambertMaterial({ color: 0x2a2a2a });
    const gm2 = new THREE.MeshLambertMaterial({ color: 0x3a3a3a });
    const wd  = new THREE.MeshLambertMaterial({ color: 0x4a3520 });

    const barrel = new THREE.Mesh(new THREE.BoxGeometry(.03,.03,.44), gm1);
    barrel.position.set(0,.015,-.24);
    const body = new THREE.Mesh(new THREE.BoxGeometry(.05,.068,.22), gm2);
    body.position.set(0,-.008,-.02);
    const magM = new THREE.Mesh(new THREE.BoxGeometry(.024,.1,.048), gm1);
    magM.position.set(0,-.068,0);
    const grip = new THREE.Mesh(new THREE.BoxGeometry(.028,.075,.036), gm2);
    grip.position.set(0,-.068,.058); grip.rotation.x = .3;
    const stock = new THREE.Mesh(new THREE.BoxGeometry(.038,.055,.13), wd);
    stock.position.set(0,-.005,.14);
    const sight = new THREE.Mesh(new THREE.BoxGeometry(.012,.018,.035), gm1);
    sight.position.set(0,.038,-.05);

    /* 槍口閃光 */
    this.flashMat = new THREE.MeshBasicMaterial({ color:0xffaa00, transparent:true, opacity:0, side:THREE.DoubleSide });
    this.flashM = new THREE.Mesh(new THREE.PlaneGeometry(.11,.11), this.flashMat);
    this.flashM.position.set(0,.015,-.47);

    this.grp.add(barrel, body, magM, grip, stock, sight, this.flashM);
    this.basePos = new THREE.Vector3(.24, -.22, -.44);
    this.grp.position.copy(this.basePos);
    camera.add(this.grp);
  }

  reset() {
    this.mag = CFG.MAG_SIZE; this.reserve = CFG.RESERVE_AMMO;
    this.reloading = false; this.recoilPitch = 0; this.recoilZ = 0;
  }

  startReload() {
    if (this.reloading || this.reserve <= 0 || this.mag >= CFG.MAG_SIZE) return;
    this.reloading = true; this.reloadT = CFG.RELOAD_TIME;
    this.audio.reload();
  }

  _finishReload() {
    const need = CFG.MAG_SIZE - this.mag;
    const t = Math.min(need, this.reserve);
    this.mag += t; this.reserve -= t;
    this.reloading = false;
    this.audio.reloadEnd();
  }

  update(dt, player) {
    const now = performance.now() / 1000;
    this.justFired = false;

    /* 後座力衰減 */
    this.recoilPitch *= (1 - 10 * dt);
    this.recoilZ *= .84;
    if (Math.abs(this.recoilPitch) < .0005) this.recoilPitch = 0;

    /* 換彈 */
    if (this.reloading) { this.reloadT -= dt; if (this.reloadT <= 0) this._finishReload(); }

    /* 射擊 */
    if (this.wantFire && !this.reloading && this.mag > 0 && now - this.lastFire >= CFG.FIRE_RATE) {
      this.mag--;
      this.lastFire = now;
      this.justFired = true;
      this.recoilPitch = -CFG.RECOIL_KICK;
      this.recoilZ = .028;
      this.flashT = .045;
      this.audio.gunshot();
    }

    /* 空彈匣自動換彈 */
    if (this.mag <= 0 && !this.reloading && this.reserve > 0) this.startReload();

    /* 閃光 */
    this.flashT = Math.max(0, this.flashT - dt);
    this.flashMat.opacity = this.flashT > 0 ? .85 : 0;
    if (this.flashT > 0) this.flashM.rotation.z = Math.random() * Math.PI;

    /* 武器搖擺 */
    let bx = 0, by = 0;
    if (player.onGround && (player.vel.x * player.vel.x + player.vel.z * player.vel.z) > 1) {
      const amp = player.sprinting ? .013 : .007;
      bx = Math.sin(player.bobT) * amp;
      by = Math.abs(Math.cos(player.bobT)) * amp;
    }
    const rDrop = this.reloading ? .14 * Math.sin(Math.PI * (1 - this.reloadT / CFG.RELOAD_TIME)) : 0;
    this.grp.position.set(
      this.basePos.x + bx,
      this.basePos.y + by - rDrop,
      this.basePos.z + this.recoilZ
    );
    this.grp.rotation.x = this.recoilPitch * 1.8;
  }
}

/* ═══════════════════════════════════════════════════════════
   ENEMY — 敵人實體 + 有限狀態機
═══════════════════════════════════════════════════════════ */
const _EState = { PATROL:0, CHASE:1, ATTACK:2, DEAD:3 };

class Enemy {
  constructor(scene, pos, world, audio, fx) {
    this.scene = scene;
    this.world = world;
    this.audio = audio;
    this.fx = fx;
    this.pos = new THREE.Vector3(pos[0], pos[1], pos[2]);
    this.vel = new THREE.Vector3();
    this.hp = CFG.ENEMY_HP;
    this.state = _EState.PATROL;
    this.patrolTgt = null;
    this.seesPlayer = false;
    this.losTimer = Math.random() * .25;
    this.lastFire = 0;
    this.stateT = 0;
    this.flashT = 0;
    this.deathT = 0;
    this._buildMesh();
    this.scene.add(this.grp);
    this.grp.position.copy(this.pos);
    this._pickPatrol();
  }

  _buildMesh() {
    this.grp = new THREE.Group();
    this.bodyMat = new THREE.MeshLambertMaterial({ color: 0x7B4B2A });
    this.headMat = new THREE.MeshLambertMaterial({ color: 0xD4A574 });
    const body = new THREE.Mesh(new THREE.CylinderGeometry(.28, .3, 1.15, 8), this.bodyMat);
    body.position.y = .6;
    body.userData.enemy = this;
    const head = new THREE.Mesh(new THREE.SphereGeometry(.22, 8, 6), this.headMat);
    head.position.y = 1.38;
    head.userData.enemy = this;
    const gunM = new THREE.MeshLambertMaterial({ color: 0x2a2a2a });
    const gun = new THREE.Mesh(new THREE.BoxGeometry(.06,.06,.42), gunM);
    gun.position.set(.34,.78,-.16);
    gun.userData.enemy = this;
    this.grp.add(body, head, gun);
    this.normalBodyCol = 0x7B4B2A;
    this.normalHeadCol = 0xD4A574;
  }

  dispose() { this.scene.remove(this.grp); }

  /* 受傷，回傳是否擊殺 */
  takeDamage(n) {
    if (this.state === _EState.DEAD) return false;
    this.hp -= n;
    this.flashT = .1;
    this.bodyMat.color.setHex(0xffffff);
    this.headMat.color.setHex(0xffffff);
    if (this.hp <= 0) { this._die(); return true; }
    return false;
  }

  _die() {
    this.state = _EState.DEAD;
    this.deathT = 0;
    this.bodyMat.color.setHex(0x555555);
    this.headMat.color.setHex(0x666666);
    this.audio.enemyDeath();
  }

  /* 視線檢測 */
  _checkLOS(player) {
    const origin = new THREE.Vector3(this.pos.x, this.pos.y + 1.3, this.pos.z);
    const target = new THREE.Vector3(player.pos.x, player.pos.y + CFG.PLAYER_HEIGHT * .5, player.pos.z);
    const dir = target.clone().sub(origin);
    const dist = dir.length();
    if (dist > CFG.ENEMY_VISION_RANGE) return false;
    dir.normalize();
    const rc = new THREE.Raycaster(origin, dir, .2, dist - .3);
    return rc.intersectObjects(this.world.meshes, false).length === 0;
  }

  /* 對玩家射擊 */
  _fire(player) {
    this.lastFire = performance.now() / 1000;
    this.audio.enemyShot();
    const origin = new THREE.Vector3(this.pos.x, this.pos.y + 1.2, this.pos.z);
    const target = new THREE.Vector3(
      player.pos.x, player.pos.y + CFG.PLAYER_HEIGHT * .6, player.pos.z);
    const dir = target.clone().sub(origin).normalize();
    dir.x += (Math.random() - .5) * CFG.ENEMY_SPREAD;
    dir.y += (Math.random() - .5) * CFG.ENEMY_SPREAD * .6;
    dir.z += (Math.random() - .5) * CFG.ENEMY_SPREAD;
    dir.normalize();

    /* 簡易命中判定：求射線離玩家最近距離 */
    const pc = new THREE.Vector3(player.pos.x, player.pos.y + CFG.PLAYER_HEIGHT * .5, player.pos.z);
    const toC = pc.clone().sub(origin);
    const t = toC.dot(dir);
    if (t > 0) {
      const cl = origin.clone().add(dir.clone().multiplyScalar(t));
      if (cl.distanceTo(pc) < .55) { player.takeDamage(CFG.ENEMY_DAMAGE); this.audio.playerHurt(); }
    }

    /* 子彈軌跡特效 */
    const end = origin.clone().add(dir.clone().multiplyScalar(28));
    const geo = new THREE.BufferGeometry().setFromPoints([origin.clone(), end]);
    const mat = new THREE.LineBasicMaterial({ color: 0xff6600, transparent: true, opacity: .5 });
    this.fx.add(new THREE.Line(geo, mat), .08);
  }

  /* 移動並碰撞 */
  _moveCollide(dt) {
    const R = CFG.ENEMY_RADIUS, H = 1.7;
    const cols = this.world.colliders;
    const ov = (px, pz, b) =>
      px + R > b.min.x && px - R < b.max.x &&
      H > b.min.y && 0 < b.max.y &&
      pz + R > b.min.z && pz - R < b.max.z;

    this.pos.x += this.vel.x * dt;
    for (const b of cols) {
      if (!ov(this.pos.x, this.pos.z, b)) continue;
      const cx = (b.min.x + b.max.x) / 2;
      this.pos.x = this.pos.x < cx ? b.min.x - R : b.max.x + R;
    }
    this.pos.z += this.vel.z * dt;
    for (const b of cols) {
      if (!ov(this.pos.x, this.pos.z, b)) continue;
      const cz = (b.min.z + b.max.z) / 2;
      this.pos.z = this.pos.z < cz ? b.min.z - R : b.max.z + R;
    }
    /* 保持在地面 & 限制範圍 */
    this.pos.y = 0;
    this.pos.x = Math.max(-29.5, Math.min(29.5, this.pos.x));
    this.pos.z = Math.max(-29.5, Math.min(29.5, this.pos.z));
  }

  /* 面向目標 */
  _face(tx, tz) {
    const dx = tx - this.pos.x, dz = tz - this.pos.z;
    this.grp.rotation.y = Math.atan2(dx, dz);
  }

  _pickPatrol() {
    this.patrolTgt = new THREE.Vector3((Math.random() - .5) * 50, 0, (Math.random() - .5) * 50);
  }

  update(dt, player) {
    /* 死亡動畫 */
    if (this.state === _EState.DEAD) {
      this.deathT += dt;
      const f = Math.min(this.deathT * 3, 1);
      this.grp.rotation.x = -f * Math.PI / 2;
      this.grp.position.y = this.pos.y - f * .45;
      return;
    }

    /* 受擊閃白恢復 */
    if (this.flashT > 0) {
      this.flashT -= dt;
      if (this.flashT <= 0) {
        this.bodyMat.color.setHex(this.normalBodyCol);
        this.headMat.color.setHex(this.normalHeadCol);
      }
    }

    /* 定時視線檢測 */
    this.losTimer -= dt;
    if (this.losTimer <= 0) {
      this.seesPlayer = this._checkLOS(player);
      this.losTimer = .22;
    }

    const toPDist = this.pos.distanceTo(player.pos);

    /* 狀態機 */
    switch (this.state) {
      case _EState.PATROL: {
        if (this.seesPlayer) { this.state = _EState.CHASE; this.stateT = 0; break; }
        if (!this.patrolTgt || this.pos.distanceTo(this.patrolTgt) < 1.8) this._pickPatrol();
        const d = this.patrolTgt.clone().sub(this.pos); d.y = 0; d.normalize();
        this.vel.x = d.x * CFG.ENEMY_SPEED * .45;
        this.vel.z = d.z * CFG.ENEMY_SPEED * .45;
        this._face(this.patrolTgt.x, this.patrolTgt.z);
        break;
      }
      case _EState.CHASE: {
        if (this.seesPlayer && toPDist < CFG.ENEMY_ATTACK_RANGE) { this.state = _EState.ATTACK; this.stateT = 0; break; }
        if (!this.seesPlayer) { this.stateT += dt; if (this.stateT > 4) { this.state = _EState.PATROL; this._pickPatrol(); break; } }
        else this.stateT = 0;
        const d = player.pos.clone().sub(this.pos); d.y = 0; d.normalize();
        this.vel.x = d.x * CFG.ENEMY_SPEED;
        this.vel.z = d.z * CFG.ENEMY_SPEED;
        this._face(player.pos.x, player.pos.z);
        break;
      }
      case _EState.ATTACK: {
        if (!this.seesPlayer || toPDist > CFG.ENEMY_ATTACK_RANGE * 1.15) { this.state = _EState.CHASE; this.stateT = 0; break; }
        this.vel.x *= .88; this.vel.z *= .88;
        this._face(player.pos.x, player.pos.z);
        const now = performance.now() / 1000;
        if (now - this.lastFire >= CFG.ENEMY_FIRE_RATE) this._fire(player);
        break;
      }
    }

    this._moveCollide(dt);
    this.grp.position.copy(this.pos);
  }
}

/* ═══════════════════════════════════════════════════════════
   ENEMY MANAGER — 生成 & 管理所有敵人
═══════════════════════════════════════════════════════════ */
class EnemyMgr {
  constructor(scene, world, audio, fx) {
    this.scene = scene; this.world = world; this.audio = audio; this.fx = fx;
    this.enemies = [];
  }

  spawnWave(wave) {
    /* 清理舊敵人 */
    for (const e of this.enemies) e.dispose();
    this.enemies.length = 0;

    const count = CFG.WAVE_BASE + (wave - 1) * CFG.WAVE_ADD;
    for (let i = 0; i < count; i++) {
      const sp = SPAWN_PTS[i % SPAWN_PTS.length];
      /* 稍微偏移避免重疊 */
      const off = [sp[0] + (Math.random() - .5) * 3, 0, sp[2] + (Math.random() - .5) * 3];
      this.enemies.push(new Enemy(this.scene, off, this.world, this.audio, this.fx));
    }
  }

  update(dt, player) {
    for (const e of this.enemies) e.update(dt, player);
  }

  allDead() {
    return this.enemies.length > 0 && this.enemies.every(e => e.state === _EState.DEAD);
  }

  getHitMeshes() {
    const arr = [];
    for (const e of this.enemies) {
      if (e.state !== _EState.DEAD) for (const c of e.grp.children) arr.push(c);
    }
    return arr;
  }

  findByObj(obj) { return obj?.userData?.enemy || null; }

  clear() { for (const e of this.enemies) e.dispose(); this.enemies.length = 0; }
}

/* ═══════════════════════════════════════════════════════════
   HUD — 更新介面元素
═══════════════════════════════════════════════════════════ */
class HUD {
  constructor() {
    this.$hpBar   = document.getElementById('hp-bar');
    this.$hpTxt   = document.getElementById('hp-txt');
    this.$mag     = document.getElementById('ammo-mag');
    this.$res     = document.getElementById('ammo-res');
    this.$rlTxt   = document.getElementById('reload-txt');
    this.$kills   = document.getElementById('kills-txt');
    this.$wave    = document.getElementById('wave-txt');
    this.$hit     = document.getElementById('hitmarker');
    this.$vig     = document.getElementById('vignette');
    this.$waveMsg = document.getElementById('wave-msg');
    this.lastHP = CFG.PLAYER_HP;
    this._hitTO = 0;
    this._waveMsgTO = 0;
  }

  update(player, weapon, kills, wave) {
    /* 血量 */
    const pct = Math.max(0, player.health / CFG.PLAYER_HP * 100);
    this.$hpBar.style.width = pct + '%';
    this.$hpBar.style.background = pct > 55 ? '#4CAF50' : pct > 25 ? '#FFC107' : '#F44336';
    this.$hpTxt.textContent = Math.ceil(player.health);

    /* 受擊暈映 */
    if (player.health < this.lastHP) this.$vig.style.opacity = '.55';
    else if (parseFloat(this.$vig.style.opacity) > 0) this.$vig.style.opacity = Math.max(0, parseFloat(this.$vig.style.opacity) - .02);
    this.lastHP = player.health;

    /* 彈藥 */
    this.$mag.textContent = weapon.mag;
    this.$res.textContent = weapon.reserve;
    this.$rlTxt.style.opacity = weapon.reloading ? '1' : '0';

    /* 計分 */
    this.$kills.textContent = 'KILLS ' + kills;
    this.$wave.textContent  = 'WAVE '  + wave;
  }

  showHit(isKill) {
    this.$hit.style.color = isKill ? '#ff4444' : '#fff';
    this.$hit.style.opacity = '1';
    clearTimeout(this._hitTO);
    this._hitTO = setTimeout(() => { this.$hit.style.opacity = '0'; }, 120);
  }

  showWave(n) {
    this.$waveMsg.textContent = 'WAVE ' + n;
    this.$waveMsg.style.opacity = '1';
    clearTimeout(this._waveMsgTO);
    this._waveMsgTO = setTimeout(() => { this.$waveMsg.style.opacity = '0'; }, 2200);
  }
}

/* ═══════════════════════════════════════════════════════════
   GAME — 主迴圈、初始化、輸入、狀態管理
═══════════════════════════════════════════════════════════ */
class Game {
  constructor() {
    /* 渲染器 */
    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.setSize(innerWidth, innerHeight);
    this.renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    this.renderer.setClearColor(0x88BBDD);
    document.body.appendChild(this.renderer.domElement);

    /* 場景 */
    this.scene = new THREE.Scene();
    this.scene.fog = new THREE.FogExp2(0x88BBDD, .011);

    /* 攝影機 */
    this.cam = new THREE.PerspectiveCamera(CFG.FOV_NORMAL, innerWidth / innerHeight, .08, 220);
    this.scene.add(this.cam);

    /* 燈光 */
    this.scene.add(new THREE.HemisphereLight(0x99BBFF, 0x445533, .55));
    const sun = new THREE.DirectionalLight(0xffffff, .85);
    sun.position.set(12, 22, 8);
    this.scene.add(sun);
    this.scene.add(new THREE.AmbientLight(0xffffff, .15));

    /* 子系統 */
    this.audio  = new AudioSys();
    this.world  = new World(this.scene);
    this.fx     = new FXManager(this.scene);
    this.player = new Player(this.cam, this.world);
    this.weapon = new Weapon(this.cam, this.scene, this.audio);
    this.eMgr   = new EnemyMgr(this.scene, this.world, this.audio, this.fx);
    this.hud    = new HUD();

    /* 遊戲狀態 */
    this.state = 'menu';
    this.kills = 0;
    this.wave  = 1;
    this.waveDelay = 0;
    this.lastT = performance.now() / 1000;

    /* 輸入 & 事件 */
    this._bindInput();
    window.addEventListener('resize', () => {
      this.cam.aspect = innerWidth / innerHeight;
      this.cam.updateProjectionMatrix();
      this.renderer.setSize(innerWidth, innerHeight);
    });

    /* 啟動主迴圈 */
    this._loop();
  }

  /* ── 輸入綁定 ── */
  _bindInput() {
    const p = this.player.input;

    document.addEventListener('keydown', e => {
      if (this.state === 'dead' && e.code === 'KeyR') { this._restart(); return; }
      if (this.state !== 'playing') return;
      switch (e.code) {
        case 'KeyW': p.fwd = 1; break;
        case 'KeyS': p.bk  = 1; break;
        case 'KeyA': p.lt  = 1; break;
        case 'KeyD': p.rt  = 1; break;
        case 'ShiftLeft': case 'ShiftRight': p.sprint = 1; break;
        case 'Space': p.jump = 1; e.preventDefault(); break;
        case 'KeyR': this.weapon.startReload(); break;
      }
    });
    document.addEventListener('keyup', e => {
      switch (e.code) {
        case 'KeyW': p.fwd = 0; break;
        case 'KeyS': p.bk  = 0; break;
        case 'KeyA': p.lt  = 0; break;
        case 'KeyD': p.rt  = 0; break;
        case 'ShiftLeft': case 'ShiftRight': p.sprint = 0; break;
        case 'Space': p.jump = 0; break;
      }
    });

    document.addEventListener('mousemove', e => {
      if (this.state !== 'playing') return;
      p.mx += e.movementX;
      p.my += e.movementY;
    });
    document.addEventListener('mousedown', e => {
      if (this.state === 'playing' && e.button === 0) this.weapon.wantFire = true;
    });
    document.addEventListener('mouseup', e => {
      if (e.button === 0) this.weapon.wantFire = false;
    });

    /* 指標鎖定 — 覆蓋層與畫布都可觸發 */
    const canvas = this.renderer.domElement;
    const overlay = document.getElementById('overlay');
    const reqLock = () => {
      if (this.state === 'menu' || this.state === 'paused') {
        const p = canvas.requestPointerLock();
        if (p && p.catch) p.catch(() => {}); // 忽略非使用者手勢導致的拒絕
      }
    };
    canvas.addEventListener('click', reqLock);
    overlay.addEventListener('click', reqLock);

    document.addEventListener('pointerlockchange', () => {
      if (document.pointerLockElement === this.renderer.domElement) {
        this.audio.init();
        if (this.state === 'menu') this._startGame();
        this.state = 'playing';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
      } else if (this.state === 'playing') {
        this.state = 'paused';
        this.weapon.wantFire = false;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('ov-title').textContent = 'PAUSED';
        document.getElementById('ov-text').textContent  = 'Click to Resume';
      }
    });
  }

  /* ── 開始 & 重啟 ── */
  _startGame() {
    this.player.respawn();
    this.weapon.reset();
    this.kills = 0; this.wave = 1; this.waveDelay = 0;
    this.eMgr.spawnWave(1);
    this.hud.lastHP = CFG.PLAYER_HP;
    this.fx.clear();
    this.hud.showWave(1);
  }

  _restart() {
    this._startGame();
    this.state = 'playing';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    this.renderer.domElement.requestPointerLock();
  }

  /* ── 射擊處理 ── */
  _processShot() {
    const rc = new THREE.Raycaster();
    rc.setFromCamera(new THREE.Vector2(0, 0), this.cam);
    rc.far = CFG.RANGE;

    const targets = [...this.world.meshes, ...this.eMgr.getHitMeshes()];
    const hits = rc.intersectObjects(targets, false);
    if (hits.length === 0) return;

    const h = hits[0];
    const enemy = this.eMgr.findByObj(h.object);
    if (enemy && enemy.state !== _EState.DEAD) {
      const killed = enemy.takeDamage(CFG.DAMAGE);
      if (killed) { this.kills++; this.audio.killMark(); }
      else this.audio.hitMark();
      this.hud.showHit(killed);
    }

    /* 彈孔 */
    const n = h.face ? h.face.normal.clone() : new THREE.Vector3(0, 1, 0);
    // 將法線從物件空間轉換到世界空間
    if (h.object) {
      const normalMatrix = new THREE.Matrix3().getNormalMatrix(h.object.matrixWorld);
      n.applyMatrix3(normalMatrix).normalize();
    }
    const imp = new THREE.Mesh(
      new THREE.CircleGeometry(.045, 6),
      new THREE.MeshBasicMaterial({ color: 0x1a1a1a, side: THREE.DoubleSide, depthWrite: false })
    );
    imp.position.copy(h.point).addScaledVector(n, .008);
    imp.lookAt(h.point.clone().add(n));
    this.fx.add(imp, 4);

    /* 擊中火花 */
    for (let i = 0; i < 4; i++) {
      const sp = new THREE.Mesh(
        new THREE.BoxGeometry(.018, .018, .018),
        new THREE.MeshBasicMaterial({ color: 0xffcc22 })
      );
      sp.position.copy(h.point);
      const sv = n.clone().add(new THREE.Vector3(
        (Math.random() - .5) * 2, Math.random() * .5, (Math.random() - .5) * 2
      )).normalize().multiplyScalar(2.5 + Math.random() * 2);
      this.fx.add(sp, .12, (m, dt2) => {
        m.position.addScaledVector(sv, dt2);
        sv.y -= 12 * dt2;
      });
    }
  }

  /* ── 主更新 ── */
  _update(dt) {
    if (this.state !== 'playing') return;

    /* 玩家 */
    this.player.update(dt, this.audio);

    /* 武器（含後座力衰減） */
    this.weapon.update(dt, this.player);

    /* 攝影機旋轉（含視覺後座力） */
    this.cam.rotation.order = 'YXZ';
    this.cam.rotation.set(
      this.player.pitch + this.weapon.recoilPitch,
      this.player.yaw,
      0
    );

    /* 射擊（先更新場景矩陣確保命中判定準確） */
    if (this.weapon.justFired) {
      this.scene.updateMatrixWorld();
      this._processShot();
    }

    /* 敵人 */
    this.eMgr.update(dt, this.player);

    /* 特效 */
    this.fx.update(dt);

    /* 玩家死亡 */
    if (this.player.health <= 0 && this.state === 'playing') {
      this.state = 'dead';
      this.weapon.wantFire = false;
      document.exitPointerLock();
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('ov-title').textContent = 'YOU DIED';
      document.getElementById('ov-text').textContent  = 'Kills: ' + this.kills + '  |  Press R to Restart';
    }

    /* 波次完成 */
    if (this.eMgr.allDead() && this.waveDelay <= 0) {
      this.waveDelay = 2.5;
    }
    if (this.waveDelay > 0) {
      this.waveDelay -= dt;
      if (this.waveDelay <= 0) {
        this.wave++;
        this.eMgr.spawnWave(this.wave);
        this.hud.showWave(this.wave);
      }
    }

    /* HUD */
    this.hud.update(this.player, this.weapon, this.kills, this.wave);
  }

  /* ── 主迴圈 ── */
  _loop() {
    requestAnimationFrame(() => this._loop());
    const now = performance.now() / 1000;
    const dt = Math.min(now - this.lastT, .05);
    this.lastT = now;
    this._update(dt);
    this.renderer.render(this.scene, this.cam);
  }
}

/* 啟動遊戲 */
const game = new Game();
</script>
